name: rifa_dorada
description: "Aplicación profesional de rifas para Colombia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.3
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.20.2
  csv: ^6.0.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  screenshot: ^3.0.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.5
  image_picker: ^1.1.2
  flutter_contacts: ^1.1.9
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo.png